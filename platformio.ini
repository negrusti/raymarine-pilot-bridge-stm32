[platformio]
default_envs = stm32pilot_f072cb

[env:stm32pilot_f072cb]
platform = ststm32
board = canable_f072cb
framework = stm32cube
monitor_speed = 115200
upload_protocol = dfu
build_flags =
  -DSTM32F072xB
  -Iinclude
  -I${platformio.packages_dir}/framework-stm32cubef0/Middlewares/ST/STM32_USB_Device_Library/Core/Inc
  -I${platformio.packages_dir}/framework-stm32cubef0/Middlewares/ST/STM32_USB_Device_Library/Core/Src
  -I${platformio.packages_dir}/framework-stm32cubef0/Middlewares/ST/STM32_USB_Device_Library/Class/CDC/Inc
  -I${platformio.packages_dir}/framework-stm32cubef0/Middlewares/ST/STM32_USB_Device_Library/Class/CDC/Src
build_src_flags =
  -Wall
  -Wextra
  -Wshadow
  -Wundef
  -Werror=return-type
